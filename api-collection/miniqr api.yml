opencollection: 1.0.0
info:
  name: MiniQR API
items:
  - info:
      name: files
      type: folder
    request:
      auth: inherit
    items:
      - info:
          name: Delete a saved QR code
          type: http
          seq: 4
          tags:
            - files
        http:
          method: DELETE
          url: '{{baseUrl}}/api/qr/files/:id'
          params:
            - name: id
              value: ''
              type: path
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: Removes the binary file and its JSON sidecar. Returns 404 if the file does not exist.
        examples:
          - name: 200 Response
            description: Default Response
            request:
              url: '{{baseUrl}}/api/qr/files/:id'
              method: DELETE
              params:
                - name: id
                  value: ''
                  type: path
            response:
              status: 200
              statusText: OK
              body:
                type: text
                data: ''
      - info:
          name: Download a saved QR code
          type: http
          seq: 3
          tags:
            - files
        http:
          method: GET
          url: '{{baseUrl}}/api/qr/files/:id'
          params:
            - name: id
              value: ''
              type: path
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          Returns the binary file. An optional extension (`.png`, `.svg`, `.jpg`) on the id is accepted so this URL can be used directly in `<img src>`.

          **Errors**: 404 if no file with that id; 409 if the requested extension does not match the saved format.
        examples:
          - name: 200 Response
            description: Default Response
            request:
              url: '{{baseUrl}}/api/qr/files/:id'
              method: GET
              params:
                - name: id
                  value: ''
                  type: path
            response:
              status: 200
              statusText: OK
              body:
                type: text
                data: ''
      - info:
          name: Get saved QR metadata
          type: http
          seq: 2
          tags:
            - files
        http:
          method: GET
          url: '{{baseUrl}}/api/qr/files/:id/meta'
          params:
            - name: id
              value: ''
              type: path
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: Returns only the JSON sidecar (config + metadata) for a saved file. 404 if no file with that id.
        examples:
          - name: 200 Response
            description: Default Response
            request:
              url: '{{baseUrl}}/api/qr/files/:id/meta'
              method: GET
              params:
                - name: id
                  value: ''
                  type: path
            response:
              status: 200
              statusText: OK
              headers:
                - name: Content-Type
                  value: application/json
              body:
                type: json
                data: |-
                  {
                    "id": "",
                    "name": "",
                    "format": "svg",
                    "size": 0,
                    "createdAt": "",
                    "url": "",
                    "config": {
                      "data": "",
                      "size": 0,
                      "margin": 0,
                      "errorCorrectionLevel": "L",
                      "dots": {
                        "shape": "square",
                        "color": ""
                      },
                      "cornerSquares": {
                        "shape": "square",
                        "color": ""
                      },
                      "cornerDots": {
                        "shape": "square",
                        "color": ""
                      },
                      "background": {
                        "color": ""
                      },
                      "image": {
                        "href": "",
                        "path": "",
                        "sizeRatio": 0,
                        "margin": 0,
                        "hideBackgroundDots": false
                      },
                      "frame": {
                        "text": "",
                        "textPosition": "top",
                        "textColor": "",
                        "backgroundColor": "",
                        "borderColor": "",
                        "borderWidth": 0,
                        "borderRadius": 0,
                        "padding": 0,
                        "fontFamily": "",
                        "fontSize": 0
                      }
                    }
                  }
          - name: 404 Response
            description: Default Response
            request:
              url: '{{baseUrl}}/api/qr/files/:id/meta'
              method: GET
              params:
                - name: id
                  value: ''
                  type: path
            response:
              status: 404
              statusText: Not Found
              headers:
                - name: Content-Type
                  value: application/json
              body:
                type: json
                data: |-
                  {
                    "error": "",
                    "message": ""
                  }
      - info:
          name: List saved QR codes
          type: http
          seq: 1
          tags:
            - files
        http:
          method: GET
          url: '{{baseUrl}}/api/qr/files'
          params:
            - name: limit
              value: '1'
              type: query
              disabled: true
            - name: offset
              value: '0'
              type: query
              disabled: true
            - name: q
              value: ''
              type: query
              disabled: true
            - name: format
              value: svg
              type: query
              disabled: true
            - name: format
              value: png
              type: query
              disabled: true
            - name: format
              value: jpg
              type: query
              disabled: true
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: Returns sidecar metadata for every saved file. Sorted newest first.
        examples:
          - name: 200 Response
            description: Default Response
            request:
              url: '{{baseUrl}}/api/qr/files'
              method: GET
              params:
                - name: limit
                  value: '1'
                  type: query
                  disabled: true
                - name: offset
                  value: '0'
                  type: query
                  disabled: true
                - name: q
                  value: ''
                  type: query
                  disabled: true
                - name: format
                  value: svg
                  type: query
                  disabled: true
                - name: format
                  value: png
                  type: query
                  disabled: true
                - name: format
                  value: jpg
                  type: query
                  disabled: true
            response:
              status: 200
              statusText: OK
              headers:
                - name: Content-Type
                  value: application/json
              body:
                type: json
                data: |-
                  {
                    "total": 0,
                    "items": [
                      {
                        "id": "",
                        "name": "",
                        "format": "svg",
                        "size": 0,
                        "createdAt": "",
                        "url": "",
                        "config": {
                          "data": "",
                          "size": 0,
                          "margin": 0,
                          "errorCorrectionLevel": "L",
                          "dots": {
                            "shape": "square",
                            "color": ""
                          },
                          "cornerSquares": {
                            "shape": "square",
                            "color": ""
                          },
                          "cornerDots": {
                            "shape": "square",
                            "color": ""
                          },
                          "background": {
                            "color": ""
                          },
                          "image": {
                            "href": "",
                            "path": "",
                            "sizeRatio": 0,
                            "margin": 0,
                            "hideBackgroundDots": false
                          },
                          "frame": {
                            "text": "",
                            "textPosition": "top",
                            "textColor": "",
                            "backgroundColor": "",
                            "borderColor": "",
                            "borderWidth": 0,
                            "borderRadius": 0,
                            "padding": 0,
                            "fontFamily": "",
                            "fontSize": 0
                          }
                        }
                      }
                    ]
                  }
  - info:
      name: health
      type: folder
    request:
      auth: inherit
    items:
      - info:
          name: Service health check
          type: http
          seq: 1
          tags:
            - health
        http:
          method: GET
          url: '{{baseUrl}}/api/health'
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: Always public; never rate limited. Use for readiness/liveness probes.
        examples:
          - name: 200 Response
            description: Default Response
            request:
              url: '{{baseUrl}}/api/health'
              method: GET
            response:
              status: 200
              statusText: OK
              headers:
                - name: Content-Type
                  value: application/json
              body:
                type: json
                data: |-
                  {
                    "status": "ok",
                    "version": ""
                  }
  - info:
      name: qr
      type: folder
    request:
      auth: inherit
    items:
      - info:
          name: Generate (and optionally save) a QR code
          type: http
          seq: 1
          tags:
            - qr
        http:
          method: POST
          url: '{{baseUrl}}/api/qr'
          body:
            type: json
            data: |-
              {
                "data": "https://qualtrics.com",
                "size": 512,
                "margin": 0,
                "errorCorrectionLevel": "Q",
                "dots": {
                  "shape": "extra-rounded",
                  "color": "#000"
                },
                "cornerSquares": {
                  "shape": "rounded",
                  "color": "#000"
                },
                "cornerDots": {
                  "shape": "rounded",
                  "color": "#0768dd"
                },
                "background": {
                  "color": "#fff"
                },
                "image": {
                  "href": "https://raw.githubusercontent.com/amanger-qual/mini-qr/refs/heads/main/public/qualtrics-250.png",
                  "sizeRatio": 1,
                  "margin": 0,
                  "hideBackgroundDots": true
                },
                "frame": {
                  "text": "Scan me 🤳",
                  "textPosition": "bottom",
                  "textColor": "#000",
                  "backgroundColor": "#fff",
                  "borderColor": "#0768dd",
                  "borderWidth": 30,
                  "borderRadius": 100,
                  "padding": 80,
                  "fontFamily": "Lato",
                  "fontSize": 98
                },
                "format": "svg",
                "save": false,
                "name": "qualtrics-qr",
                "quality": 1
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          Returns the binary QR code in the requested format (image/svg+xml, image/png, or image/jpeg).

          If `save: true` the file is also persisted on the server and the response includes an `X-QR-File-Id` header along with a `Location` header pointing to the download URL.

          **Logo input** (in priority order):
          1. `image.path` — read a file from the server-side `LOGO_DIR`.
          2. `image.href` as a `data:` URI — bytes inlined in the request.
          3. `image.href` as `https://` or `http://` — server fetches with SSRF guards (no private IPs, 5MB max, 5s timeout, image/*). Hostname can be restricted via the `REMOTE_LOGO_HOSTS` env.

          To upload a logo as a file part instead of inlining bytes, use `POST /api/qr/upload` with `multipart/form-data`.

          **Errors**: 400 on invalid input, 413 on logo too large, 415 on bad MIME, 502/504 on remote fetch failure, 500 on render failure.
        examples:
          - name: 200 Response
            description: Default Response
            request:
              url: '{{baseUrl}}/api/qr'
              method: POST
              body:
                type: json
                data: |-
                  {
                    "data": "",
                    "size": 0,
                    "margin": 0,
                    "errorCorrectionLevel": "L",
                    "dots": {
                      "shape": "square",
                      "color": ""
                    },
                    "cornerSquares": {
                      "shape": "square",
                      "color": ""
                    },
                    "cornerDots": {
                      "shape": "square",
                      "color": ""
                    },
                    "background": {
                      "color": ""
                    },
                    "image": {
                      "href": "",
                      "path": "",
                      "sizeRatio": 0,
                      "margin": 0,
                      "hideBackgroundDots": false
                    },
                    "frame": {
                      "text": "",
                      "textPosition": "top",
                      "textColor": "",
                      "backgroundColor": "",
                      "borderColor": "",
                      "borderWidth": 0,
                      "borderRadius": 0,
                      "padding": 0,
                      "fontFamily": "",
                      "fontSize": 0
                    },
                    "format": "svg",
                    "save": false,
                    "name": "",
                    "quality": 0
                  }
            response:
              status: 200
              statusText: OK
              body:
                type: text
                data: ''
      - info:
          name: Generate a QR code with a multipart-uploaded logo
          type: http
          seq: 2
          tags:
            - qr
        http:
          method: POST
          url: '{{baseUrl}}/api/qr/upload'
          body:
            type: multipart-form
            data:
              - name: logo
                type: file
                value:
                  - /Users/amanger/Downloads/qualtrics square low res.png
              - name: config
                type: text
                value: |-
                  {
                    "data": "https://qualtrics.com",
                    "size": 512,
                    "margin": 0,
                    "errorCorrectionLevel": "Q",
                    "dots": {
                      "shape": "classy-rounded",
                      "color": "#000"
                    },
                    "cornerSquares": {
                      "shape": "square",
                      "color": "#000"
                    },
                    "cornerDots": {
                      "shape": "rounded",
                      "color": "#000"
                    },
                    "background": {
                      "color": "#fff"
                    },
                    "format": "svg",
                    "save": false,
                    "name": "qualtrics-qr-uploaded",
                    "quality": 1
                  }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
        docs: |-
          Multipart variant of `POST /api/qr`. Send two parts:

          - `config` (text/json) — the same JSON body that `POST /api/qr` accepts. Strip `image.href`/`image.path`; they will be replaced by the uploaded file.
          - `logo` (file) — the image bytes. Inferred MIME or use `Content-Type: image/*` on the part.

          Example:
          ```bash
          curl -X POST http://localhost:8080/api/qr/upload \
            -F 'config={"data":"https://example.com","format":"png","save":true,"name":"with-logo"}' \
            -F 'logo=@./logo.png' \
            --output qr.png
          ```
        examples:
          - name: 200 Response
            description: Default Response
            request:
              url: '{{baseUrl}}/api/qr/upload'
              method: POST
            response:
              status: 200
              statusText: OK
              body:
                type: text
                data: ''
request:
  variables:
    - name: baseUrl
      value: localhost
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-05-19T16:25:21.640Z'
    exportedUsing: Bruno
