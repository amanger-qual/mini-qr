---
services:
  mini-qr:
    build: .
    # To pull the upstream prebuilt SPA-only image instead, swap the line
    # above for:
    #   image: ghcr.io/lyqht/mini-qr:latest
    # Note: the upstream image does not include the HTTP API.
    container_name: mini-qr
    restart: unless-stopped
    networks:
      - mini-qr-network
    # API settings — uncomment to require an API key, change rate limit, or
    # relocate persisted QR codes. See SELF_HOSTING.md for the full HTTP API.
    # environment:
    #   API_KEY: change-me
    #   API_RATE_LIMIT_PER_MIN: 1000
    #   QR_STORAGE_DIR: /data/qr-files
    #   # --- Split-port mode (optional) ---
    #   # API_PORT: 8081
    # # Expose the API port too when running split mode:
    # ports:
    #   - 8081:8081
    # Persist server-saved QR codes across container restarts.
    # volumes:
    #   - ./qr-files:/data/qr-files

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - 80:80
    restart: unless-stopped
    configs:
      - source: nginx-proxy-conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - mini-qr
    networks:
      - mini-qr-network

configs:
  nginx-proxy-conf:
    content: |
      events {
          worker_connections 1024;
      }
      http {
          include       /etc/nginx/mime.types;
          default_type  application/octet-stream;
          sendfile      on;
          keepalive_timeout 65;
          upstream mini-qr-backend {
              server mini-qr:8080;
          }
          server {
              listen 80;
              server_name localhost;
              location / {
                  proxy_pass http://mini-qr-backend;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }
              location /health {
                  access_log off;
                  return 200 "healthy\n";
                  add_header Content-Type text/plain;
              }
              error_page 500 502 503 504 /50x.html;
              location = /50x.html {
                  root /usr/share/nginx/html;
              }
          }
      }

networks:
  mini-qr-network:
    driver: bridge
