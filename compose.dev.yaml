---
services:
  mini-qr:
    image: ghcr.io/amanger-qual/mini-qr:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_PATH: ${BASE_PATH:-/}
        VITE_HIDE_CREDITS: ${VITE_HIDE_CREDITS:-false}
        VITE_DEFAULT_PRESET: ${VITE_DEFAULT_PRESET:-}
        VITE_DEFAULT_DATA_TO_ENCODE: ${VITE_DEFAULT_DATA_TO_ENCODE:-}
        VITE_QR_CODE_PRESETS: ${VITE_QR_CODE_PRESETS:-[]}
        VITE_FRAME_PRESET: ${VITE_FRAME_PRESET:-}
        VITE_FRAME_PRESETS: ${VITE_FRAME_PRESETS:-[]}
        VITE_DISABLE_LOCAL_STORAGE: ${VITE_DISABLE_LOCAL_STORAGE:-false}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-dev}
